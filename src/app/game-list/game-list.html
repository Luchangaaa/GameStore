<table class="table text-center">
    <thead>
        <tr>
            <th>Imagen</th>
            <th>Nombre</th>
            <th>Género</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Compra</th>
        </tr>
    </thead>
    <tbody>
      @for (game of games; track game.nombre) {
        <tr [class.clearance]="game.clearance">
            <td><img width="100" class="img-thumbnail" [src]="game.img" [alt]="game.nombre"></td>
            <td>{{game.nombre}}</td>
            <td>{{game.genero}}</td>
            <td>{{game.precio | currency }}</td>
            @if (game.stock > 0) {
                <td>{{game.stock}}</td>
            } @else {
                <td><span class="badge bg-warning text-dark">SIN STOCK</span></td>
            }
            <td class="text-center">
                <div class="d-flex align-items-center justify-content-center">
                    <div class="input-group input-group-sm" style="width:140px; min-width:120px;">
                        <button class="btn btn-primary btn-sm" type="button" (click)="downQuantity(game)">-</button>
                        <input
                            type="text"
                            class="form-control text-center"
                            [(ngModel)]="game.cantidad"
                            (keydown)="ChangeQuantity($event, game)"
                            style="max-width:64px; min-width:48px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"
                        >
                        <button class="btn btn-primary btn-sm" type="button" (click)="upQuantity(game)">+</button>
                    </div>
                </div>
            </td>
        </tr>
      } @empty {
        <tr>
            <td colspan="4">No hay juegos disponibles.</td>
        </tr>
      }
    </tbody>
</table>
