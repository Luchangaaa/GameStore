<div class="bg-dark text-light">

    <header class="py-5 bg-black border-bottom border-secondary text-center">
        <div class="container py-5">
            <h1 class="display-4 fw-bold text-uppercase text-warning">Contacto</h1>
            <p class="lead text-secondary mx-auto" style="max-width: 600px;">
                ¿Tienes dudas sobre una clave o buscas un título específico? Nuestro equipo de soporte está listo para ayudarte a entrar al juego.
            </p>
        </div>
    </header>

    <section class="container py-5 my-5">
        <div class="row g-5 justify-content-center">
            
            <div class="col-lg-4">
                <h2 class="h3 fw-bold text-uppercase mb-4">Canales Oficiales</h2>
                
                <div class="d-flex align-items-center mb-4">
                    <div class="bg-secondary bg-opacity-25 border border-secondary rounded p-3 me-3 text-warning">
                        <i class="fas fa-envelope fa-lg"></i>
                    </div>
                    <div>
                        <p class="mb-0 small text-secondary text-uppercase fw-bold">Escríbenos</p>
                        <p class="mb-0">soporte@gamestore.com</p>
                    </div>
                </div>

                <div class="d-flex align-items-center mb-4">
                    <div class="bg-secondary bg-opacity-25 border border-secondary rounded p-3 me-3 text-warning">
                        <i class="fas fa-clock fa-lg"></i>
                    </div>
                    <div>
                        <p class="mb-0 small text-secondary text-uppercase fw-bold">Horario de Atención</p>
                        <p class="mb-0">Lunes a Viernes: 24/7</p>
                    </div>
                </div>

                <div class="d-flex align-items-center mb-4">
                    <div class="bg-secondary bg-opacity-25 border border-secondary rounded p-3 me-3 text-warning">
                        <i class="fas fa-headset fa-lg"></i>
                    </div>
                    <div>
                        <p class="mb-0 small text-secondary text-uppercase fw-bold">Soporte Técnico</p>
                        <p class="mb-0">2494123456</p>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="card bg-black border-secondary p-4 p-md-5 shadow-lg">
                    <h2 class="h4 fw-bold text-uppercase mb-4">Envía un Mensaje</h2>
                    
                    <form>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small text-secondary text-uppercase fw-bold">Nombre</label>
                                <input type="text" class="form-control bg-dark border-secondary text-light py-2" placeholder="Tu nombre gamer" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label small text-secondary text-uppercase fw-bold">Correo Electrónico</label>
                                <input type="email" class="form-control bg-dark border-secondary text-light py-2" placeholder="nombre@correo.com" required>
                            </div>

                            <div class="col-12">
                                <label class="form-label small text-secondary text-uppercase fw-bold">Juego o Asunto de consulta</label>
                                <input type="text" class="form-control bg-dark border-secondary text-light py-2" placeholder="Ej: Problema con clave de Elden Ring">
                            </div>

                            <div class="col-12">
                                <label class="form-label small text-secondary text-uppercase fw-bold">Mensaje</label>
                                <textarea class="form-control bg-dark border-secondary text-light py-2" rows="5" placeholder="Escribe tu mensaje detallado aquí..." required></textarea>
                            </div>

                            <div class="col-12 mt-4 text-end">
                                <button type="submit" class="btn btn-warning btn-lg text-uppercase fw-bold px-5 py-3">
                                    Enviar Consulta <i class="fas fa-paper-plane ms-2"></i>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </section>
</div>
